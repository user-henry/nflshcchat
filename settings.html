<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 设置</title>
    <link rel="stylesheet" href="css/themes.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .nav {
            background: var(--bg-secondary);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .nav h2 { font-size: 20px; color: var(--accent-color); }
        .nav a { color: var(--text-primary); text-decoration: none; margin-left: 20px; transition: color 0.3s; }
        .nav a:hover { color: var(--accent-color); }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .card h2 {
            color: var(--accent-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-label h3 { margin-bottom: 5px; }
        .setting-label p { font-size: 12px; color: var(--text-secondary); }
        .theme-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .theme-btn.active { border-color: var(--accent-color); transform: scale(1.1); }
        .theme-btn.dark { background: #1a1a2e; border: 2px solid #ffd700; }
        .theme-btn.light { background: #f5f5f5; border: 2px solid #333; }
        .theme-btn.blue { background: #0d2137; border: 2px solid #3498db; }
        .theme-btn.purple { background: #1a0a2e; border: 2px solid #9b59b6; }
        .theme-btn.green { background: #0a2e1a; border: 2px solid #2ecc71; }
        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        select, input {
            padding: 8px 12px;
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        /* 开关样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: var(--accent-color);
        }
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="nav">
        <div class="nav-left"><div class="logo"></div><h2>⚙️ NFLSHC Chat 设置</h2></div>
        <div>
            <span>欢迎，<span id="username"></span></span>
            <a href="chat.html">💬 聊天</a>
            <a href="#" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>🎨 主题选择</h2>
            <div class="theme-buttons">
                <div class="theme-btn dark" onclick="setTheme('dark')" title="暗色主题"></div>
                <div class="theme-btn light" onclick="setTheme('light')" title="浅色主题"></div>
                <div class="theme-btn blue" onclick="setTheme('blue')" title="蓝色主题"></div>
                <div class="theme-btn purple" onclick="setTheme('purple')" title="紫色主题"></div>
                <div class="theme-btn green" onclick="setTheme('green')" title="绿色主题"></div>
            </div>
        </div>

        <div class="card">
            <h2>🔔 通知设置</h2>
            <div class="setting-item">
                <div class="setting-label">
                    <h3>@提及通知</h3>
                    <p>有人@你时发送系统通知</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="mentionNotify">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <h3>系统通知</h3>
                    <p>接收系统公告和通知</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="systemNotify">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>🔒 隐私设置</h2>
            <div class="setting-item">
                <div class="setting-label">
                    <h3>允许私聊</h3>
                    <p>是否允许其他用户给您发送私聊消息</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="allowPrivateChat">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>💾 数据管理</h2>
            <div class="setting-item">
                <div class="setting-label">
                    <h3>清除本地缓存</h3>
                    <p>清除浏览器中存储的本地数据</p>
                </div>
                <button class="btn" onclick="clearLocalData()">清除缓存</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        function checkAuth() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) { window.location.href = 'index.html'; return null; }
            const user = JSON.parse(userStr);
            document.getElementById('username').textContent = user.username;
            return user;
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-btn.${theme}`)?.classList.add('active');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
            document.getElementById('mentionNotify').checked = localStorage.getItem('mentionNotify') === 'true';
            document.getElementById('systemNotify').checked = localStorage.getItem('systemNotify') === 'true';
            document.getElementById('allowPrivateChat').checked = localStorage.getItem('allowPrivateChat') !== 'false';
        }

        function saveSettings() {
            localStorage.setItem('mentionNotify', document.getElementById('mentionNotify').checked);
            localStorage.setItem('systemNotify', document.getElementById('systemNotify').checked);
            localStorage.setItem('allowPrivateChat', document.getElementById('allowPrivateChat').checked);
            alert('设置已保存');
        }

        function clearLocalData() {
            if (confirm('确定要清除所有本地缓存数据吗？这不会影响您的账号和聊天记录。')) {
                localStorage.removeItem('theme');
                localStorage.removeItem('mentionNotify');
                localStorage.removeItem('systemNotify');
                localStorage.removeItem('allowPrivateChat');
                alert('缓存已清除，页面将刷新');
                location.reload();
            }
        }

        document.getElementById('mentionNotify').addEventListener('change', saveSettings);
        document.getElementById('systemNotify').addEventListener('change', saveSettings);
        document.getElementById('allowPrivateChat').addEventListener('change', saveSettings);

        currentUser = checkAuth();
        if (currentUser) loadTheme();
    </script>
</body>
</html>
