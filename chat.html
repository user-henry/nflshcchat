<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; min-height: 100vh; }

        .nav {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd700;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .nav h2 { font-size: 20px; color: #ffd700; }
        .nav a { color: white; text-decoration: none; margin-left: 20px; transition: color 0.3s; }
        .nav a:hover { color: #ffd700; }

        /* 通知按钮样式 */
        .notification-btn {
            position: relative;
            cursor: pointer;
        }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -15px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            min-width: 18px;
            text-align: center;
        }
        .notification-badge.zero {
            background: #28a745;
        }

        /* 通知下拉面板 */
        .notification-panel {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 350px;
            max-height: 400px;
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #ffd700;
            z-index: 100;
            overflow-y: auto;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .notification-panel.show { display: block; }
        .notification-item {
            padding: 12px;
            border-bottom: 1px solid #2a2a3e;
            cursor: pointer;
        }
        .notification-item:hover { background: #1a1a2e; }
        .notification-item.unread { background: #2a1a3e; }
        .notification-title { font-weight: bold; color: #ffd700; margin-bottom: 5px; }
        .notification-content { font-size: 12px; color: #aaa; }
        .notification-time { font-size: 10px; color: #666; margin-top: 5px; }

        .chat-container {
            display: flex;
            max-width: 1400px;
            margin: 20px auto;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            height: calc(100vh - 80px);
        }

        .rooms-sidebar {
            width: 300px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a3e;
        }
        .rooms-header { padding: 20px; border-bottom: 1px solid #2a2a3e; }
        .rooms-header h3 { color: #ffd700; margin-bottom: 10px; }
        .create-room-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .rooms-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            background: #1a1a2e;
        }
        .room-item:hover { background: #2a2a3e; transform: translateX(5px); }
        .room-item.active { background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%); color: #1a1a2e; }
        .room-name { font-weight: 600; margin-bottom: 4px; }
        .room-type { font-size: 11px; opacity: 0.7; }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: #16213e; }
        .chat-header { padding: 20px; border-bottom: 1px solid #2a2a3e; background: #1a1a2e; }
