<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 管理员后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }

        /* 导航栏 */
        .nav {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd700;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .nav h2 {
            font-size: 20px;
            color: #ffd700;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #ffd700;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2a2a3e;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            color: #aaa;
            margin-top: 8px;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 24px;
            background: #16213e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #1a1a2e;
            border-color: #ffd700;
        }

        /* 卡片样式 */
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #2a2a3e;
        }

        .card h2 {
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a3e;
        }

        /* 聊天室网格 */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .room-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #2a2a3e;
            transition: transform 0.2s;
        }

        .room-card:hover {
            transform: translateY(-3px);
            border-color: #ffd700;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .room-type {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #2a2a3e;
            color: #aaa;
        }

        .room-type.private {
            background: #dc3545;
            color: white;
        }

        .room-type.group {
            background: #28a745;
            color: white;
        }

        .room-info {
            margin-bottom: 12px;
        }

        .room-info p {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .room-members {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px;
            margin: 12px 0;
        }

        .room-members h4 {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .member-tag {
            background: #2a2a3e;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #ddd;
        }

        .member-tag.creator {
            background: #ffd700;
            color: #1a1a2e;
        }

        .room-stats {
            display: flex;
            gap: 15px;
            margin: 12px 0;
            font-size: 12px;
            color: #888;
        }

        .ban-btn, .unban-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: transform 0.2s;
            width: 100%;
        }

        .ban-btn {
            background: #dc3545;
            color: white;
        }

        .unban-btn {
            background: #28a745;
            color: white;
        }

        .ban-btn:hover, .unban-btn:hover {
            transform: translateY(-2px);
        }

        /* 用户列表 */
        .user-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .user-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .user-meta {
            font-size: 12px;
            color: #aaa;
        }

        .admin-badge, .banned-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }

        .admin-badge {
            background: #ffd700;
            color: #1a1a2e;
        }

        .banned-badge {
            background: #dc3545;
            color: white;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .ban-user-btn, .unban-user-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .ban-user-btn {
            background: #dc3545;
            color: white;
        }

        .unban-user-btn {
            background: #28a745;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .rooms-grid {
                grid-template-columns: 1fr;
            }
            .user-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-left">
            <div class="logo"></div>
            <h2>👑 NFLSHC Chat 管理后台</h2>
        </div>
        <div>
            <span>欢迎，管理员 <span id="adminName"></span></span>
            <a href="chat.html">💬 聊天</a>
            <a href="notice.html">📢 公告</a>
            <a href="index.html" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRooms">0</div>
                <div class="stat-label">聊天室总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalGroupRooms">0</div>
                <div class="stat-label">群聊数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPrivateRooms">0</div>
                <div class="stat-label">私聊数量</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')">💬 所有聊天室</button>
            <button class="tab-btn" onclick="switchTab('users')">👥 用户管理</button>
        </div>

        <!-- 聊天室列表（所有聊天室） -->
        <div id="roomsTab" class="card">
            <h2>📋 所有聊天室</h2>
            <div id="roomsList" class="rooms-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 用户列表 -->
        <div id="usersTab" class="card" style="display: none;">
            <h2>👥 用户管理</h2>
            <div id="usersList" class="user-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentAdmin = null;
        let allUsers = [];
        let allRooms = [];
        let allMessages = [];

        // ========== 认证检查 ==========
        function checkAdmin() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'index.html';
                return null;
            }
            const user = JSON.parse(userStr);
            if (!user.isAdmin) {
                alert('无权访问管理员后台');
                window.location.href = 'chat.html';
                return null;
            }
            document.getElementById('adminName').textContent = user.username;
            return user;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // ========== 加载所有数据 ==========
        async function loadAllData() {
            try {
                const baseUrl = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues`;
                
                // 获取用户
                const usersRes = await fetch(`${baseUrl}?labels=user&state=open`, {
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const userIssues = await usersRes.json();
                allUsers = [];
                for (const issue of userIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const userData = JSON.parse(match[1]);
                        allUsers.push({ ...userData, issueNumber: issue.number });
                    }
                }

                // 获取聊天室
                const roomsRes = await fetch(`${baseUrl}?labels=chatroom&state=open`, {
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const roomIssues = await roomsRes.json();
                allRooms = [];
                for (const issue of roomIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const roomData = JSON.parse(match[1]);
                        allRooms.push({ ...roomData, issueNumber: issue.number });
                    }
                }

                // 获取所有消息（用于统计人数）
                const messagesRes = await fetch(`${baseUrl}?labels=chatmessage&state=open`, {
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const messageIssues = await messagesRes.json();
                allMessages = [];
                for (const issue of messageIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const msgData = JSON.parse(match[1]);
                        allMessages.push(msgData);
                    }
                }

                // 更新统计
                updateStats();
                renderRooms();
                renderUsers();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('roomsList').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
                document.getElementById('usersList').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        // ========== 更新统计 ==========
        function updateStats() {
            const groupRooms = allRooms.filter(r => r.type === 'group');
            const privateRooms = allRooms.filter(r => r.type === 'private');
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalRooms').textContent = allRooms.length;
            document.getElementById('totalGroupRooms').textContent = groupRooms.length;
            document.getElementById('totalPrivateRooms').textContent = privateRooms.length;
        }

        // ========== 获取聊天室消息数 ==========
        function getMessageCount(roomId) {
            return allMessages.filter(m => m.roomId === roomId).length;
        }

        // ========== 获取聊天室的活跃成员（发送过消息的用户） ==========
        function getActiveMembers(roomId) {
            const senders = allMessages
                .filter(m => m.roomId === roomId)
                .map(m => m.sender);
            // 去重
            return [...new Set(senders)];
        }

        // ========== 获取聊天室成员显示（基于消息发送记录） ==========
        function getRoomMembersDisplay(room) {
            const activeMembers = getActiveMembers(room.id);
            
            if (room.type === 'group') {
                // 群聊：基于消息发送记录
                if (activeMembers.length > 0) {
                    return activeMembers;
                }
                // 如果还没有人发过消息，显示创建者
                return [room.creator];
            } else {
                // 私聊：基于消息发送记录或成员列表
                if (activeMembers.length > 0) {
                    return activeMembers;
                }
                if (room.members && room.members.length >= 2) {
                    return room.members;
                }
                return [room.creator, room.members?.[1] || '未知'].filter(Boolean);
            }
        }

        // ========== 获取私聊对象描述 ==========
        function getPrivateChatDescription(room) {
            if (room.type !== 'private') return null;
            const members = getRoomMembersDisplay(room);
            const otherUser = members.find(m => m !== room.creator);
            return otherUser ? `与 ${otherUser} 的私聊` : '私聊';
        }

        // ========== 渲染聊天室列表 ==========
        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (allRooms.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无聊天室</div>';
                return;
            }

            container.innerHTML = allRooms.map(room => {
                const members = getRoomMembersDisplay(room);
                const messageCount = getMessageCount(room.id);
                const privateDesc = getPrivateChatDescription(room);
                
                return `
                    <div class="room-card">
                        <div class="room-header">
                            <span class="room-name">${escapeHtml(room.name)}</span>
                            <span class="room-type ${room.type}">${room.type === 'group' ? '👥 群聊' : '🔒 私聊'}</span>
                        </div>
                        <div class="room-info">
                            <p>📅 创建时间: ${new Date(room.createdAt).toLocaleString()}</p>
                            <p>👤 创建者: ${escapeHtml(room.creator)}</p>
                            ${room.type === 'private' && privateDesc ? `<p>💬 ${escapeHtml(privateDesc)}</p>` : ''}
                            <p>📊 消息总数: ${messageCount} 条</p>
                            <p>👥 ${room.type === 'group' ? '活跃成员数' : '参与人数'}: ${members.length} 人</p>
                            ${room.type === 'group' && messageCount === 0 ? '<p style="color: #888;">💡 暂无消息，成员列表将显示创建者</p>' : ''}
                            ${room.isBanned ? '<p style="color: #dc3545;">🚫 状态: 已封禁</p>' : '<p style="color: #28a745;">✅ 状态: 正常</p>'}
                        </div>
                        <div class="room-members">
                            <h4>📋 ${room.type === 'group' ? '活跃成员列表（发送过消息）' : '聊天双方'}</h4>
                            <div class="member-list">
                                ${members.map(m => `
                                    <span class="member-tag ${m === room.creator ? 'creator' : ''}">
                                        ${escapeHtml(m)}${m === room.creator ? ' (创建者)' : ''}
                                    </span>
                                `).join('')}
                            </div>
                            ${room.type === 'group' && members.length === 1 && messageCount === 0 ? 
                                '<p style="font-size: 11px; color: #888; margin-top: 8px;">⚠️ 暂无其他成员，邀请好友加入群聊吧</p>' : ''}
                        </div>
                        <div class="room-stats">
                            <span>🆔 ID: ${room.id.substring(0, 12)}...</span>
                        </div>
                        ${room.type === 'group' ? `
                            <div style="margin-top: 12px;">
                                ${room.isBanned ? 
                                    `<button class="unban-btn" onclick="toggleRoomBan('${room.id}', false)">解除封禁群聊</button>` :
                                    `<button class="ban-btn" onclick="toggleRoomBan('${room.id}', true)">封禁群聊</button>`
                                }
                            </div>
                        ` : `
                            <div style="margin-top: 12px;">
                                <span style="font-size: 12px; color: #888;">💡 私聊无法封禁，只能封禁用户</span>
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        // ========== 渲染用户列表 ==========
        function renderUsers() {
            const container = document.getElementById('usersList');
            if (allUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无用户</div>';
                return;
            }

            // 统计每个用户参与的聊天室数量（基于消息发送记录）
            const userRoomCount = {};
            for (const msg of allMessages) {
                if (!userRoomCount[msg.sender]) {
                    userRoomCount[msg.sender] = new Set();
                }
                userRoomCount[msg.sender].add(msg.roomId);
            }

            container.innerHTML = allUsers.map(user => {
                const roomCount = userRoomCount[user.username] ? userRoomCount[user.username].size : 0;
                return `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-name">
                                ${escapeHtml(user.username)}
                                ${user.username === 'huangzhiyuan' ? '<span class="admin-badge">管理员</span>' : ''}
                                ${user.isBanned ? '<span class="banned-badge">已封禁</span>' : ''}
                            </div>
                            <div class="user-meta">
                                注册时间: ${new Date(user.createdAt).toLocaleString()}<br>
                                参与聊天室: ${roomCount} 个<br>
                                发送消息: ${allMessages.filter(m => m.sender === user.username).length} 条
                            </div>
                        </div>
                        <div class="actions">
                            ${user.username !== 'huangzhiyuan' ? `
                                ${user.isBanned ? 
                                    `<button class="unban-user-btn" onclick="toggleUserBan('${user.username}', false)">解除封禁</button>` :
                                    `<button class="ban-user-btn" onclick="toggleUserBan('${user.username}', true)">封禁用户</button>`
                                }
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== 封禁/解封用户 ==========
        async function toggleUserBan(username, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}用户 ${username} 吗？\n封禁后该用户将无法发送消息。`)) return;
            
            const user = allUsers.find(u => u.username === username);
            if (!user) return;

            user.isBanned = shouldBan;
            user.bannedAt = shouldBan ? new Date().toISOString() : null;

            const updatedBody = `用户信息\n\`\`\`json\n${JSON.stringify(user, null, 2)}\n\`\`\``;
            
            try {
                await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${user.issueNumber}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ body: updatedBody })
                });
                alert(shouldBan ? `用户 ${username} 已被封禁` : `用户 ${username} 已解除封禁`);
                loadAllData();
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        // ========== 封禁/解封群聊 ==========
        async function toggleRoomBan(roomId, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}该群聊吗？\n封禁后所有成员将无法访问。`)) return;
            
            const room = allRooms.find(r => r.id === roomId);
            if (!room) return;

            room.isBanned = shouldBan;
            room.bannedAt = shouldBan ? new Date().toISOString() : null;

            const updatedBody = `聊天室信息\n\`\`\`json\n${JSON.stringify(room, null, 2)}\n\`\`\``;
            
            try {
                await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${room.issueNumber}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ body: updatedBody })
                });
                alert(shouldBan ? `群聊 "${room.name}" 已被封禁` : `群聊 "${room.name}" 已解除封禁`);
                loadAllData();
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        // ========== 切换标签页 ==========
        function switchTab(tab) {
            const roomsTab = document.getElementById('roomsTab');
            const usersTab = document.getElementById('usersTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'rooms') {
                roomsTab.style.display = 'block';
                usersTab.style.display = 'none';
                btns[0].classList.add('active');
            } else {
                roomsTab.style.display = 'none';
                usersTab.style.display = 'block';
                btns[1].classList.add('active');
                renderUsers();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        currentAdmin = checkAdmin();
