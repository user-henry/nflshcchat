<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 管理员后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }
        .nav {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd700;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .nav h2 { font-size: 20px; color: #ffd700; }
        .nav a { color: white; text-decoration: none; margin-left: 20px; transition: color 0.3s; }
        .nav a:hover { color: #ffd700; }
        
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2a2a3e;
        }
        .stat-number { font-size: 36px; font-weight: bold; color: #ffd700; }
        .stat-label { color: #aaa; margin-top: 8px; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 24px;
            background: #16213e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: #ffd700; color: #1a1a2e; border-color: #ffd700; }
        
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #2a2a3e;
        }
        .card h2 { color: #ffd700; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #2a2a3e; }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        .room-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #2a2a3e;
            transition: transform 0.2s;
        }
        .room-card:hover { transform: translateY(-3px); border-color: #ffd700; }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .room-name { font-size: 18px; font-weight: bold; color: #ffd700; }
        .room-type {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .room-type.private { background: #dc3545; color: white; }
        .room-type.group { background: #28a745; color: white; }
        .room-info p { color: #aaa; font-size: 13px; margin-bottom: 6px; }
        .room-members {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px;
            margin: 12px 0;
        }
        .room-members h4 { color: #ffd700; font-size: 12px; margin-bottom: 8px; }
        .member-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .member-tag {
            background: #2a2a3e;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #ddd;
        }
        .member-tag.creator { background: #ffd700; color: #1a1a2e; }
        
        .user-list { max-height: 500px; overflow-y: auto; }
        .user-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: bold; color: #ffd700; margin-bottom: 5px; }
        .user-meta { font-size: 12px; color: #aaa; }
        .admin-badge, .banned-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        .admin-badge { background: #ffd700; color: #1a1a2e; }
        .banned-badge { background: #dc3545; color: white; }
        
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .ban-user-btn, .unban-user-btn, .notify-user-btn, .ban-btn, .unban-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .ban-user-btn, .ban-btn { background: #dc3545; color: white; }
        .unban-user-btn, .unban-btn { background: #28a745; color: white; }
        .notify-user-btn { background: #ffc107; color: #1a1a2e; }
        
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 16px;
            width: 450px;
            border: 1px solid #ffd700;
        }
        .modal-content h3 { color: #ffd700; margin-bottom: 20px; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-family: inherit;
        }
        .modal-content textarea { resize: vertical; min-height: 100px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-buttons button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .modal-buttons button:first-child { background: #2a2a3e; color: white; }
        .modal-buttons button:last-child { background: #ffd700; color: #1a1a2e; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .rooms-grid { grid-template-columns: 1fr; }
            .user-item { flex-direction: column; align-items: flex-start; }
            .actions { align-self: flex-end; }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-left"><div class="logo"></div><h2>👑 NFLSHC Chat 管理后台</h2></div>
        <div>
            <span>欢迎，管理员 <span id="adminName"></span></span>
            <a href="admin-suggestions.html">💡 建议审核</a>
            <a href="chat.html">💬 聊天</a>
            <a href="notice.html">📢 公告</a>
            <a href="index.html" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">总用户数</div></div>
            <div class="stat-card"><div class="stat-number" id="totalRooms">0</div><div class="stat-label">聊天室总数</div></div>
            <div class="stat-card"><div class="stat-number" id="totalGroupRooms">0</div><div class="stat-label">群聊数量</div></div>
            <div class="stat-card"><div class="stat-number" id="totalPrivateRooms">0</div><div class="stat-label">私聊数量</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')">💬 所有聊天室</button>
            <button class="tab-btn" onclick="switchTab('users')">👥 用户管理</button>
            <button class="tab-btn" onclick="switchTab('notifications')">📨 系统通知</button>
        </div>

        <div id="roomsTab" class="card">
            <h2>📋 所有聊天室</h2>
            <div id="roomsList" class="rooms-grid"><div class="loading">加载中...</div></div>
        </div>

        <div id="usersTab" class="card" style="display: none;">
            <h2>👥 用户管理</h2>
            <div id="usersList" class="user-list"><div class="loading">加载中...</div></div>
        </div>

        <div id="notificationsTab" class="card" style="display: none;">
            <h2>📨 系统通知记录</h2>
            <div id="notificationsList" class="user-list"><div class="loading">加载中...</div></div>
        </div>
    </div>

    <div id="notifyModal" class="modal">
        <div class="modal-content">
            <h3>📨 发送系统通知</h3>
            <p style="color: #aaa; margin-bottom: 15px;">发送给: <span id="notifyTargetUser" style="color: #ffd700;"></span></p>
            <input type="text" id="notifyTitle" placeholder="通知标题">
            <textarea id="notifyMessage" placeholder="通知内容..."></textarea>
            <div class="modal-buttons">
                <button onclick="closeNotifyModal()">取消</button>
                <button onclick="sendSystemNotification()">发送通知</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentAdmin = null;
        let allUsers = [];
        let allRooms = [];
        let allMessages = [];
        let allNotifications = [];
        let currentNotifyUser = null;

        function checkAdmin() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) { window.location.href = 'index.html'; return null; }
            const user = JSON.parse(userStr);
            if (!user.isAdmin) { alert('无权访问管理员后台'); window.location.href = 'chat.html'; return null; }
            document.getElementById('adminName').textContent = user.username;
            return user;
        }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        async function loadAllData() {
            try {
                const baseUrl = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues`;
                
                const usersRes = await fetch(`${baseUrl}?labels=user&state=open`, {
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const userIssues = await usersRes.json();
                allUsers = [];
                for (const issue of userIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) { const userData = JSON.parse(match[1]); allUsers.push({ ...userData, issueNumber: issue.number }); }
                }

                const roomsRes = await fetch(`${baseUrl}?labels=chatroom&state=open`, {
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const roomIssues = await roomsRes.json();
                allRooms = [];
                for (const issue of roomIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) { const roomData = JSON.parse(match[1]); allRooms.push({ ...roomData, issueNumber: issue.number }); }
                }

                const messagesRes = await fetch(`${baseUrl}?labels=chatmessage&state=open`, {
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const messageIssues = await messagesRes.json();
                allMessages = [];
                for (const issue of messageIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) { allMessages.push(JSON.parse(match[1])); }
                }

                const notifRes = await fetch(`${baseUrl}?labels=system_notification&state=open`, {
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const notifIssues = await notifRes.json();
                allNotifications = [];
                for (const issue of notifIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) { allNotifications.push(JSON.parse(match[1])); }
                }

                updateStats();
                renderRooms();
                renderUsers();
                renderNotifications();
            } catch (error) { console.error('加载数据失败:', error); }
        }

        function updateStats() {
            const groupRooms = allRooms.filter(r => r.type === 'group');
            const privateRooms = allRooms.filter(r => r.type === 'private');
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('totalRooms').textContent = allRooms.length;
            document.getElementById('totalGroupRooms').textContent = groupRooms.length;
            document.getElementById('totalPrivateRooms').textContent = privateRooms.length;
        }

        function getMessageCount(roomId) { return allMessages.filter(m => m.roomId === roomId).length; }
        function getActiveMembers(roomId) { return [...new Set(allMessages.filter(m => m.roomId === roomId).map(m => m.sender))]; }
        
        function getRoomMembersDisplay(room) {
            const activeMembers = getActiveMembers(room.id);
            if (room.type === 'group') {
                if (activeMembers.length > 0) return activeMembers;
                return [room.creator];
            } else {
                if (activeMembers.length > 0) return activeMembers;
                if (room.members && room.members.length >= 2) return room.members;
                return [room.creator, room.members?.[1] || '未知'].filter(Boolean);
            }
        }

        function renderRooms() {
            const container = document.getElementById('roomsList');
            if (allRooms.length === 0) { container.innerHTML = '<div class="empty-state">暂无聊天室</div>'; return; }
            container.innerHTML = allRooms.map(room => {
                const members = getRoomMembersDisplay(room);
                const messageCount = getMessageCount(room.id);
                return `
                    <div class="room-card">
                        <div class="room-header">
                            <span class="room-name">${escapeHtml(room.name)}</span>
                            <span class="room-type ${room.type}">${room.type === 'group' ? '👥 群聊' : '🔒 私聊'}</span>
                        </div>
                        <div class="room-info">
                            <p>📅 创建时间: ${new Date(room.createdAt).toLocaleString()}</p>
                            <p>👤 创建者: ${escapeHtml(room.creator)}</p>
                            <p>📊 消息总数: ${messageCount} 条</p>
                            <p>👥 ${room.type === 'group' ? '活跃成员数' : '参与人数'}: ${members.length} 人</p>
                            ${room.isBanned ? '<p style="color: #dc3545;">🚫 状态: 已封禁</p>' : '<p style="color: #28a745;">✅ 状态: 正常</p>'}
                        </div>
                        <div class="room-members">
                            <h4>📋 ${room.type === 'group' ? '活跃成员列表' : '聊天双方'}</h4>
                            <div class="member-list">${members.map(m => `<span class="member-tag ${m === room.creator ? 'creator' : ''}">${escapeHtml(m)}${m === room.creator ? ' (创建者)' : ''}</span>`).join('')}</div>
                        </div>
                        ${room.type === 'group' ? `
                            <div>${room.isBanned ? 
                                `<button class="unban-btn" onclick="toggleRoomBan('${room.id}', false)">解除封禁群聊</button>` :
                                `<button class="ban-btn" onclick="toggleRoomBan('${room.id}', true)">封禁群聊</button>`}
                            </div>
                        ` : '<div style="margin-top: 12px;"><span style="font-size: 12px; color: #888;">💡 私聊无法封禁，只能封禁用户</span></div>'}
                    </div>
                `;
            }).join('');
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (allUsers.length === 0) { container.innerHTML = '<div class="empty-state">暂无用户</div>'; return; }
            const userRoomCount = {};
            for (const msg of allMessages) {
                if (!userRoomCount[msg.sender]) userRoomCount[msg.sender] = new Set();
                userRoomCount[msg.sender].add(msg.roomId);
            }
            container.innerHTML = allUsers.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.username)}${user.username === 'huangzhiyuan' ? '<span class="admin-badge">管理员</span>' : ''}${user.isBanned ? '<span class="banned-badge">已封禁</span>' : ''}</div>
                        <div class="user-meta">注册时间: ${new Date(user.createdAt).toLocaleString()}<br>参与聊天室: ${userRoomCount[user.username]?.size || 0} 个<br>发送消息: ${allMessages.filter(m => m.sender === user.username).length} 条</div>
                    </div>
                    <div class="actions">
                        ${user.username !== 'huangzhiyuan' ? `
                            <button class="notify-user-btn" onclick="showNotifyModal('${user.username}')">📨 发通知</button>
                            ${user.isBanned ? 
                                `<button class="unban-user-btn" onclick="toggleUserBan('${user.username}', false)">解除封禁</button>` :
                                `<button class="ban-user-btn" onclick="toggleUserBan('${user.username}', true)">封禁用户</button>`}
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderNotifications() {
            const container = document.getElementById('notificationsList');
            if (allNotifications.length === 0) { container.innerHTML = '<div class="empty-state">暂无系统通知记录</div>'; return; }
            allNotifications.sort((a, b) => new Date(b.sentAt) - new Date(a.sentAt));
            container.innerHTML = allNotifications.map(notif => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">📨 ${escapeHtml(notif.title)}</div>
                        <div class="user-meta">发送给: ${escapeHtml(notif.targetUser)}<br>发送时间: ${new Date(notif.sentAt).toLocaleString()}<br>内容: ${escapeHtml(notif.content)}</div>
                    </div>
                </div>
            `).join('');
        }

        async function sendSystemNotification() {
            const title = document.getElementById('notifyTitle').value.trim();
            const content = document.getElementById('notifyMessage').value.trim();
            if (!title || !content) { alert('请填写通知标题和内容'); return; }
            const notificationData = {
                id: `notif_${Date.now()}`,
                type: 'system',
                title: title,
                content: content,
                targetUser: currentNotifyUser,
                sender: 'system',
                sentAt: new Date().toISOString(),
                isRead: false
            };
            try {
                const issueBody = `系统通知\n\`\`\`json\n${JSON.stringify(notificationData, null, 2)}\n\`\`\``;
                await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `系统通知: ${title}`, body: issueBody, labels: ['system_notification'] })
                });
                alert(`通知已发送给 ${currentNotifyUser}`);
                closeNotifyModal();
                loadAllData();
            } catch (error) { alert('发送失败: ' + error.message); }
        }

        function showNotifyModal(username) { currentNotifyUser = username; document.getElementById('notifyTargetUser').textContent = username; document.getElementById('notifyTitle').value = ''; document.getElementById('notifyMessage').value = ''; document.getElementById('notifyModal').style.display = 'flex'; }
        function closeNotifyModal() { document.getElementById('notifyModal').style.display = 'none'; currentNotifyUser = null; }

        async function toggleUserBan(username, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}用户 ${username} 吗？`)) return;
            const user = allUsers.find(u => u.username === username);
            if (!user) return;
            user.isBanned = shouldBan;
            const updatedBody = `用户信息\n\`\`\`json\n${JSON.stringify(user, null, 2)}\n\`\`\``;
            await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${user.issueNumber}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ body: updatedBody })
            });
            alert(shouldBan ? `用户 ${username} 已被封禁` : `用户 ${username} 已解除封禁`);
            loadAllData();
        }

        async function toggleRoomBan(roomId, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}该群聊吗？`)) return;
            const room = allRooms.find(r => r.id === roomId);
            if (!room) return;
            room.isBanned = shouldBan;
            const updatedBody = `聊天室信息\n\`\`\`json\n${JSON.stringify(room, null, 2)}\n\`\`\``;
            await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${room.issueNumber}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ body: updatedBody })
            });
            alert(shouldBan ? `群聊已被封禁` : `群聊已解除封禁`);
            loadAllData();
        }

        function switchTab(tab) {
            const roomsTab = document.getElementById('roomsTab');
            const usersTab = document.getElementById('usersTab');
            const notificationsTab = document.getElementById('notificationsTab');
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            roomsTab.style.display = 'none';
            usersTab.style.display = 'none';
            notificationsTab.style.display = 'none';
            if (tab === 'rooms') { roomsTab.style.display = 'block'; btns[0].classList.add('active'); }
            else if (tab === 'users') { usersTab.style.display = 'block'; btns[1].classList.add('active'); }
            else { notificationsTab.style.display = 'block'; btns[2].classList.add('active'); renderNotifications(); }
        }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        currentAdmin = checkAdmin();
        if (currentAdmin) { loadAllData(); setInterval(loadAllData, 30000); }
    </script>
</body>
</html>
