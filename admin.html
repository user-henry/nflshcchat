<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 管理员后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }

        /* 导航栏 */
        .nav {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd700;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .nav h2 {
            font-size: 20px;
            color: #ffd700;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #ffd700;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2a2a3e;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            color: #aaa;
            margin-top: 8px;
        }

        /* 卡片样式 */
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #2a2a3e;
        }

        .card h2 {
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a3e;
        }

        /* 表格样式 */
        .user-list, .room-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item, .room-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info, .room-info {
            flex: 1;
        }

        .user-name, .room-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .user-meta, .room-meta {
            font-size: 12px;
            color: #aaa;
        }

        .admin-badge {
            background: #ffd700;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }

        .banned-badge {
            background: #dc3545;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .ban-btn, .unban-btn, .delete-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .ban-btn {
            background: #dc3545;
            color: white;
        }

        .unban-btn {
            background: #28a745;
            color: white;
        }

        .delete-btn {
            background: #ffc107;
            color: #1a1a2e;
        }

        .ban-btn:hover, .unban-btn:hover, .delete-btn:hover {
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .user-item, .room-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-left">
            <div class="logo"></div>
            <h2>👑 NFLSHC Chat 管理后台</h2>
        </div>
        <div>
            <span>欢迎，管理员 <span id="adminName"></span></span>
            <a href="chat.html">💬 聊天</a>
            <a href="notice.html">📢 公告</a>
            <a href="index.html" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRooms">0</div>
                <div class="stat-label">聊天室数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="bannedUsers">0</div>
                <div class="stat-label">已封禁用户</div>
            </div>
        </div>

        <!-- 用户管理 -->
        <div class="card">
            <h2>👥 用户管理</h2>
            <div id="usersList" class="user-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 群聊管理 -->
        <div class="card">
            <h2>🏠 群聊管理</h2>
            <div id="roomsList" class="room-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentAdmin = null;
        let allUsers = [];
        let allRooms = [];

        // ========== 认证检查 ==========
        function checkAdmin() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'index.html';
                return null;
            }
            const user = JSON.parse(userStr);
            if (!user.isAdmin) {
                alert('无权访问管理员后台');
                window.location.href = 'chat.html';
                return null;
            }
            document.getElementById('adminName').textContent = user.username;
            return user;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // ========== 加载数据 ==========
        async function loadData() {
            try {
                const baseUrl = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues`;
                
                // 获取用户
                const usersRes = await fetch(`${baseUrl}?labels=user&state=open`, {
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const userIssues = await usersRes.json();
                allUsers = [];
                for (const issue of userIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const userData = JSON.parse(match[1]);
                        allUsers.push({ ...userData, issueNumber: issue.number });
                    }
                }

                // 获取聊天室
                const roomsRes = await fetch(`${baseUrl}?labels=chatroom&state=open`, {
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const roomIssues = await roomsRes.json();
                allRooms = [];
                for (const issue of roomIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const roomData = JSON.parse(match[1]);
                        allRooms.push({ ...roomData, issueNumber: issue.number });
                    }
                }

                // 更新统计
                document.getElementById('totalUsers').textContent = allUsers.length;
                document.getElementById('totalRooms').textContent = allRooms.filter(r => r.type === 'group').length;
                document.getElementById('bannedUsers').textContent = allUsers.filter(u => u.isBanned).length;

                renderUsers();
                renderRooms();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('usersList').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
                document.getElementById('roomsList').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        // ========== 渲染用户列表 ==========
        function renderUsers() {
            const container = document.getElementById('usersList');
            if (allUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无用户</div>';
                return;
            }

            container.innerHTML = allUsers.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">
                            ${escapeHtml(user.username)}
                            ${user.username === 'huangzhiyuan' ? '<span class="admin-badge">管理员</span>' : ''}
                            ${user.isBanned ? '<span class="banned-badge">已封禁</span>' : ''}
                        </div>
                        <div class="user-meta">
                            注册时间: ${new Date(user.createdAt).toLocaleString()}
                        </div>
                    </div>
                    <div class="actions">
                        ${user.username !== 'huangzhiyuan' ? `
                            ${user.isBanned ? 
                                `<button class="unban-btn" onclick="toggleUserBan('${user.username}', false)">解除封禁</button>` :
                                `<button class="ban-btn" onclick="toggleUserBan('${user.username}', true)">封禁用户</button>`
                            }
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ========== 渲染群聊列表 ==========
        function renderRooms() {
            const container = document.getElementById('roomsList');
            const groupRooms = allRooms.filter(r => r.type === 'group');
            
            if (groupRooms.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无群聊</div>';
                return;
            }

            container.innerHTML = groupRooms.map(room => `
                <div class="room-item">
                    <div class="room-info">
                        <div class="room-name">
                            ${escapeHtml(room.name)}
                            ${room.isBanned ? '<span class="banned-badge">已封禁</span>' : ''}
                        </div>
                        <div class="room-meta">
                            创建者: ${escapeHtml(room.creator)} · 创建于 ${new Date(room.createdAt).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="actions">
                        ${room.isBanned ? 
                            `<button class="unban-btn" onclick="toggleRoomBan('${room.id}', false)">解除封禁</button>` :
                            `<button class="ban-btn" onclick="toggleRoomBan('${room.id}', true)">封禁群聊</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        // ========== 封禁/解封用户 ==========
        async function toggleUserBan(username, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}用户 ${username} 吗？`)) return;
            
            const user = allUsers.find(u => u.username === username);
            if (!user) return;

            user.isBanned = shouldBan;
            user.bannedAt = shouldBan ? new Date().toISOString() : null;

            const updatedBody = `用户信息\n\`\`\`json\n${JSON.stringify(user, null, 2)}\n\`\`\``;
            
            try {
                await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${user.issueNumber}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ body: updatedBody })
                });
                alert(shouldBan ? `用户 ${username} 已被封禁` : `用户 ${username} 已解除封禁`);
                loadData();
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        // ========== 封禁/解封群聊 ==========
        async function toggleRoomBan(roomId, shouldBan) {
            if (!confirm(`确定要${shouldBan ? '封禁' : '解除封禁'}该群聊吗？封禁后所有成员将无法访问。`)) return;
            
            const room = allRooms.find(r => r.id === roomId);
            if (!room) return;

            room.isBanned = shouldBan;
            room.bannedAt = shouldBan ? new Date().toISOString() : null;

            const updatedBody = `聊天室信息\n\`\`\`json\n${JSON.stringify(room, null, 2)}\n\`\`\``;
            
            try {
                await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${room.issueNumber}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ body: updatedBody })
                });
                alert(shouldBan ? `群聊 "${room.name}" 已被封禁` : `群聊 "${room.name}" 已解除封禁`);
                loadData();
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        currentAdmin = checkAdmin();
        if (currentAdmin) {
            loadData();
            // 每30秒刷新一次数据
            setInterval(loadData, 30000);
        }
    </script>
</body>
</html>
