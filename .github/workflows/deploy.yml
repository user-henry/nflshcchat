name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create config.js
        run: |
          echo "window.CONFIG = {" > config.js
          echo "  GITHUB_USERNAME: 'user-henry'," >> config.js
          echo "  GITHUB_REPO: 'nflshcchat'," >> config.js
          echo "  GITHUB_TOKEN: '${{ secrets.TOKEN }}'" >> config.js
          echo "};" >> config.js
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
