<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 个人资料</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }
        .nav {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd700;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .nav h2 { font-size: 20px; color: #ffd700; }
        .nav a { color: white; text-decoration: none; margin-left: 20px; transition: color 0.3s; }
        .nav a:hover { color: #ffd700; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .profile-card {
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2a3e;
        }
        .profile-header {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            padding: 40px;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto 15px;
            background-size: cover;
            background-position: center;
        }
        .avatar-upload-area {
            display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .avatar-upload-preview {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ffd700;
            background-size: cover; background-position: center; background-color: #1a1a2e;
            flex-shrink: 0;
        }
        .avatar-upload-btn {
            background: #2ecc71; color: white; border: none; border-radius: 8px;
            padding: 8px 16px; cursor: pointer; font-size: 14px;
        }
        .avatar-upload-btn:hover { background: #27ae60; }
        .avatar-upload-status { font-size: 12px; color: #aaa; margin-top: 5px; }
        .profile-header h1 { color: #1a1a2e; margin-bottom: 5px; }
        .admin-badge {
            background: #1a1a2e;
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }
        .level-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 4px; vertical-align: middle; }
        .level-badge.level-low { background: #2ecc71; color: #1a1a2e; }
        .level-badge.level-mid { background: #3498db; color: white; }
        .level-badge.level-high { background: #9b59b6; color: white; }
        .level-badge.level-top { background: #ffd700; color: #1a1a2e; }
        
        .profile-body { padding: 30px; }
        .info-section { margin-bottom: 25px; }
        .info-section h3 {
            color: #ffd700;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #2a2a3e;
        }
        .info-section p { color: #ddd; line-height: 1.6; }
        .rooms-list { margin-top: 10px; }
        .room-tag {
            display: inline-block;
            background: #2a2a3e;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 13px;
            color: #ffd700;
        }
        
        .edit-form { margin-top: 30px; padding-top: 20px; border-top: 1px solid #2a2a3e; }
        .edit-form h3 { color: #ffd700; margin-bottom: 15px; }
        .edit-form input, .edit-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-family: inherit;
        }
        .edit-form textarea { resize: vertical; min-height: 100px; }
        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .share-card-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 2000;
        }
        .share-card-modal.show { display: flex; }
        .share-card-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #ffd700;
            border-radius: 20px; padding: 30px; text-align: center; max-width: 380px; width: 90%;
        }
        .share-card-content .share-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffd700; margin: 0 auto 12px; background-size: cover; background-position: center; }
        .share-card-content h2 { color: #ffd700; margin-bottom: 8px; }
        .share-card-content p { color: #aaa; font-size: 14px; margin-bottom: 6px; }
        .share-card-content .share-link { background: #0f0f1a; padding: 8px 12px; border-radius: 8px; font-size: 12px; color: #ffd700; word-break: break-all; margin: 12px 0; }
        .share-card-content .share-actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .message.success { background: rgba(40,167,69,0.2); color: #28a745; }
        .message.error { background: rgba(220,53,69,0.2); color: #dc3545; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-left"><div class="logo"></div><h2>💬 NFLSHC Chat</h2></div>
        <div>
            <span>欢迎，<span id="username"></span></span>
            <a href="chat.html">💬 聊天</a>
            <a href="friends.html">👥 好友</a>
            <a href="suggestions.html">💡 意见反馈</a>
            <a href="notice.html">📢 公告</a>
            <a href="#" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container" id="container">
        <div class="loading">加载中...</div>
    </div>

    <!-- Feature #14: Share Personal Card Modal -->
    <div class="share-card-modal" id="shareCardModal">
        <div class="share-card-content">
            <div class="share-avatar" id="shareAvatar"></div>
            <h2 id="shareName"></h2>
            <p id="shareBio"></p>
            <p id="shareLevel"></p>
            <div class="share-link" id="shareLink"></div>
            <div class="share-actions">
                <button class="btn" onclick="copyShareLink()">📋 复制链接</button>
                <button class="btn" style="background: #dc3545; color: white;" onclick="closeShareCard()">关闭</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentUser = null;
        let viewUser = null;
        let allRooms = [];
        let allMessages = [];

        const SITE_LOGO = 'https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png';
        
        function logout() { 
            // 清除 localStorage 和 sessionStorage 中的登录状态
            localStorage.removeItem('nflshc_currentUser');
            sessionStorage.removeItem('currentUser');
            sessionStorage.removeItem('nflshc_user');
            // 如果有全局清除函数也调用一下
            if (window.clearLoginState) window.clearLoginState();
            window.location.href = 'index.html'; 
        }
        
        function isSystemAdmin(username) {
            return username === 'huangzhiyuan';
        }
        function calculateLevel(xp) { return Math.floor(Math.sqrt(xp / 10)) + 1; }
        function getLevelClass(level) { if (level <= 3) return 'level-low'; if (level <= 6) return 'level-mid'; if (level <= 9) return 'level-high'; return 'level-top'; }

        async function loadUserData(username) {
            // 系统管理员特判
            if (isSystemAdmin(username)) {
                return {
                    username: 'huangzhiyuan',
                    email: 'admin@nflshc.com',
                    bio: '平台创始人及系统管理员，负责网站的维护和管理。',
                    createdAt: new Date().toISOString(),
                    isBanned: false,
                    avatar: SITE_LOGO,
                    isAdmin: true
                };
            }
            
            const url = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues?labels=user&state=open`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const issues = await res.json();
            
            for (const issue of issues) {
                const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                if (match) {
                    try {
                        const user = JSON.parse(match[1]);
                        if (user.username === username) {
                            user.avatar = user.avatarUrl || SITE_LOGO;
                            return { ...user, issueNumber: issue.number };
                        }
                    } catch (e) {
                        console.error('解析用户数据失败:', e);
                    }
                }
            }
            
            for (const issue of issues) {
                if (issue.title === `User: ${username}`) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        try {
                            const user = JSON.parse(match[1]);
                            user.avatar = user.avatarUrl || SITE_LOGO;
                            return { ...user, issueNumber: issue.number };
                        } catch (e) {}
                    }
                }
            }
            
            return null;
        }

        async function loadRoomsAndMessages() {
            const baseUrl = `https://api.github.com/repos/` + window.CONFIG.GITHUB_USERNAME + `/` + window.CONFIG.GITHUB_REPO + `/issues`;
            const headers = { 'Authorization': `token ` + window.CONFIG.GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' };

            // Load rooms
            const roomsRes = await fetch(baseUrl + `?labels=chatroom&state=open`, { headers });
            const roomIssues = await roomsRes.json();
            allRooms = [];
            for (const issue of roomIssues) {
                const match = issue.body.match(/``json\n([\s\S]*?)\n``/);
                if (match) {
                    const room = JSON.parse(match[1]);
                    allRooms.push({ ...room, issueNumber: issue.number });
                }
            }
            
            // Load ALL messages with pagination
            allMessages = [];
            let page = 1;
            let hasMore = true;
            while (hasMore) {
                const msgRes = await fetch(baseUrl + `?labels=chatmessage&state=open&per_page=100&page=` + page, { headers });
                const linkHeader = msgRes.headers.get('Link');
                hasMore = linkHeader && linkHeader.includes('rel="next"');
                const msgIssues = await msgRes.json();
                if (msgIssues.length === 0) break;
                for (const issue of msgIssues) {
                    const match = issue.body.match(/``json\n([\s\S]*?)\n``/);
                    if (match) {
                        try { allMessages.push(JSON.parse(match[1])); } catch(e) {}
                    }
                }
                page++;
                if (page > 30) break;
            }
        }

        function getUserRooms(username) {
            const userRooms = [];
            for (const room of allRooms) {
                if (room.type === 'private') {
                    if (room.members && room.members.includes(username)) {
                        userRooms.push(room);
                    }
                } else if (!room.isBanned) {
                    const activeMembers = [...new Set(allMessages.filter(m => m.roomId === room.id).map(m => m.sender))];
                    if (activeMembers.includes(username) || room.creator === username) {
                        userRooms.push(room);
                    }
                }
            }
            return userRooms;
        }

        async function updateUserProfile(updates) {
            const user = viewUser;
            Object.assign(user, updates);
            user.updatedAt = new Date().toISOString();
            const updatedBody = `用户信息\n\`\`\`json\n${JSON.stringify(user, null, 2)}\n\`\`\``;
            await fetch(`https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues/${user.issueNumber}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ body: updatedBody })
            });
        }

        async function renderProfile() {
            const container = document.getElementById('container');
            const isOwnProfile = (currentUser.username === viewUser.username);
            const avatarSrc = viewUser.avatarUrl || SITE_LOGO;
            const isAdminUser = viewUser.username === 'huangzhiyuan';
            const userMsgCount = allMessages.filter(m => m.sender === viewUser.username && !m.isRecalled).length;
            const level = calculateLevel(userMsgCount);
            const levelClass = getLevelClass(level);
            
            if (!viewUser) {
                container.innerHTML = '<div class="loading" style="color: #dc3545;">❌ 用户不存在或数据加载失败</div>';
                return;
            }
            
            const userRooms = getUserRooms(viewUser.username);
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="avatar" style="background-image: url('${avatarSrc}')"></div>
                        <h1>${escapeHtml(viewUser.username)} ${isAdminUser ? '<span class="admin-badge">👑 系统管理员</span>' : ''} <span class="level-badge ${levelClass}">Lv.${level}</span></h1>
                    </div>
                    <div class="profile-body">
                        <div class="info-section">
                            <h3>📝 个人简介</h3>
                            <p>${escapeHtml(viewUser.bio || '这个人很懒，什么都没有写。')}</p>
                        </div>
                        ${!isAdminUser ? `
                        <div class="info-section">
                            <h3>📊 活跃统计</h3>
                            <p>等级: <strong>Lv.${level}</strong> | 经验值: <strong>${userMsgCount} XP</strong> | 消息数: <strong>${userMsgCount}</strong></p>
                        </div>
                        <div class="info-section">
                            <h3>📅 注册时间</h3>
                            <p>${new Date(viewUser.createdAt).toLocaleString()}</p>
                        </div>
                        ` : `
                        <div class="info-section">
                            <h3>📊 活跃统计</h3>
                            <p>等级: <strong>Lv.${level}</strong> | 经验值: <strong>${userMsgCount} XP</strong> | 消息数: <strong>${userMsgCount}</strong></p>
                        </div>
                        `}
                        <div class="info-section">
                            <h3>💬 参与的聊天室</h3>
                            <div class="rooms-list">
                                ${userRooms.length === 0 ? '<p style="color: #aaa;">暂无参与的聊天室</p>' : 
                                    userRooms.map(room => `<span class="room-tag">${escapeHtml(room.name)} (${room.type === 'group' ? '群聊' : '私聊'})</span>`).join('')}
                            </div>
                        </div>
                        ${isOwnProfile ? `
                            <div class="edit-form">
                                <h3>✏️ 编辑个人资料</h3>
                                <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(this)" style="display:none;">
                                <div class="avatar-upload-area">
                                    <div class="avatar-upload-preview" id="avatarPreview" style="background-image:url('${viewUser.avatarUrl || SITE_LOGO}')"></div>
                                    <div>
                                        <button type="button" class="avatar-upload-btn" onclick="document.getElementById('avatarFileInput').click()">&#x1F4F7; 上传头像</button>
                                        <div class="avatar-upload-status" id="avatarUploadStatus">支持 JPG/PNG/GIF，&le;5MB</div>
                                    </div>
                                </div>
                                <input type="text" id="editAvatar" placeholder="或粘贴头像图片链接" value="${escapeHtml(viewUser.avatarUrl || '')}" style="margin-top:5px;">
                                <textarea id="editBio" placeholder="个人简介">${escapeHtml(viewUser.bio || '')}</textarea>
                                <input type="password" id="editPassword" placeholder="新密码（留空则不修改）">
                                <input type="password" id="editConfirmPassword" placeholder="确认新密码">
                                <button class="btn" onclick="updateProfile()">保存修改</button>
                                <button class="btn" onclick="showShareCard()" style="background: #2ecc71; color: white; margin-left: 10px;">📋 分享个人名片</button>
                                <div id="editMessage" class="message" style="display: none;"></div>
                            </div>
                        ` : ''}
                        ${isOwnProfile && isAdminUser ? `
                            <div style="margin-top: 15px; text-align: center;">
                                <a href="admin-profile.html" class="btn">👑 进入管理员中心</a>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // ===== 头像上传功能 =====
        async function handleAvatarUpload(fileInput) {
            var file = fileInput.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过 5MB！', 'error');
                return;
            }
            var statusEl = document.getElementById('avatarUploadStatus');
            var previewEl = document.getElementById('avatarPreview');
            var avatarUrlInput = document.getElementById('editAvatar');
            statusEl.textContent = '⏳ 正在上传...';
            try {
                var base64 = await new Promise(function(resolve) {
                    var reader = new FileReader();
                    reader.onload = function(e) { resolve(e.target.result); };
                    reader.readAsDataURL(file);
                });
                var resp = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { 'Authorization': 'Client-ID 7a3d6e9b0c8a4e5' },
                    body: base64.split(',')[1]
                });
                if (!resp.ok) throw new Error('上传服务不可用');
                var data = await resp.json();
                if (data.success && data.data && data.data.link) {
                    previewEl.style.backgroundImage = "url('" + data.data.link + "')";
                    avatarUrlInput.value = data.data.link;
                    statusEl.textContent = '✅ 上传成功！点击保存修改生效';
                    showToast('头像上传成功！', 'success');
                } else {
                    throw new Error(data.data && data.data.error ? data.data.error : '上传失败');
                }
            } catch (err) {
                console.error('Avatar upload error:', err);
                statusEl.textContent = '❌ 上传失败，请重试或直接粘贴图片链接';
                showToast('头像上传失败：' + err.message, 'error');
            }
            fileInput.value = '';
        }

        async function updateProfile() {
            const newBio = document.getElementById('editBio').value.trim();
            const newPassword = document.getElementById('editPassword').value;
            const confirmPassword = document.getElementById('editConfirmPassword').value;
            const msgDiv = document.getElementById('editMessage');
            
            if (newPassword && newPassword !== confirmPassword) {
                msgDiv.style.display = 'block';
                msgDiv.className = 'message error';
                msgDiv.innerHTML = '两次密码不一致';
                setTimeout(() => msgDiv.style.display = 'none', 3000);
                return;
            }
            
            const newAvatar = document.getElementById('editAvatar').value.trim();
            const updates = { bio: newBio || '这个人很懒，什么都没有写。', avatarUrl: newAvatar };
            if (newPassword) {
                updates.password = newPassword;
            }
            
            try {
                await updateUserProfile(updates);
                msgDiv.style.display = 'block';
                msgDiv.className = 'message success';
                msgDiv.innerHTML = '✅ 个人资料已更新';
                if (newPassword) {
                    sessionStorage.setItem('currentUser', JSON.stringify({ username: currentUser.username, isAdmin: currentUser.isAdmin }));
                }
                viewUser = await loadUserData(currentUser.username);
                renderProfile();
                setTimeout(() => msgDiv.style.display = 'none', 3000);
            } catch (error) {
                msgDiv.style.display = 'block';
                msgDiv.className = 'message error';
                msgDiv.innerHTML = `更新失败: ${error.message}`;
                setTimeout(() => msgDiv.style.display = 'none', 3000);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function init() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(userStr);
            document.getElementById('username').textContent = currentUser.username;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetUser = urlParams.get('user') || currentUser.username;
            
            await loadRoomsAndMessages();
            viewUser = await loadUserData(targetUser);
            if (!viewUser) {
                document.getElementById('container').innerHTML = '<div class="loading" style="color: #dc3545;">❌ 用户不存在或数据加载失败</div>';
                return;
            }
            await renderProfile();
        }

        // === Feature #14: Personal Card Share ===
        function showShareCard() {
            if (!viewUser) return;
            const avatarSrc = viewUser.avatarUrl || SITE_LOGO;
            const userMsgCount = allMessages.filter(m => m.sender === viewUser.username && !m.isRecalled).length;
            const level = calculateLevel(userMsgCount);
            document.getElementById('shareAvatar').style.backgroundImage = 'url("' + avatarSrc + '")';
            document.getElementById('shareName').textContent = viewUser.username;
            document.getElementById('shareBio').textContent = viewUser.bio || '这个人很懒，什么都没有写。';
            document.getElementById('shareLevel').textContent = '🏆 Lv.' + level + ' | ' + userMsgCount + ' 条消息';
            const profileUrl = window.location.origin + window.location.pathname.replace('profile.html', '') + 'profile.html?user=' + encodeURIComponent(viewUser.username);
            document.getElementById('shareLink').textContent = profileUrl;
            document.getElementById('shareCardModal').classList.add('show');
        }

        function closeShareCard() {
            document.getElementById('shareCardModal').classList.remove('show');
        }

        function copyShareLink() {
            const link = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(link).then(function() {
                alert('✅ 链接已复制到剪贴板！');
            }).catch(function() {
                const ta = document.createElement('textarea');
                ta.value = link; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                alert('✅ 链接已复制到剪贴板！');
            });
        }
        
        init();
    </script>
    <script src="shortcuts.js"></script>
</body>
</html>
