<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFLSHC Chat - 消息搜索</title>
    <link rel="stylesheet" href="css/themes.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .nav {
            background: var(--bg-secondary);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            width: 40px;
            height: 40px;
            background-image: url('https://cdn.luogu.com.cn/upload/image_hosting/5rdb3c08.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .nav h2 { font-size: 20px; color: var(--accent-color); }
        .nav a { color: var(--text-primary); text-decoration: none; margin-left: 20px; transition: color 0.3s; }
        .nav a:hover { color: var(--accent-color); }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .search-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .search-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .search-input input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            font-size: 16px;
        }
        .search-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .search-filters select, .search-filters input {
            padding: 8px 12px;
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .result-item {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-color);
        }
        .result-room { font-size: 12px; color: var(--accent-color); margin-bottom: 5px; }
        .result-sender { font-weight: bold; margin-bottom: 5px; }
        .result-content { color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
        .result-content mark { background: #f39c12; color: #1a1a2e; padding: 0 2px; border-radius: 3px; }
        .result-time { font-size: 11px; color: #666; }
        
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .page-btn:hover {
            background: var(--accent-color);
            color: #1a1a2e;
        }
        .page-btn.active {
            background: var(--accent-color);
            color: #1a1a2e;
            border-color: var(--accent-color);
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .empty-state { text-align: center; padding: 60px; color: var(--text-secondary); }
        .stats-info {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="nav">
        <div class="nav-left"><div class="logo"></div><h2>🔍 NFLSHC Chat 消息搜索</h2></div>
        <div>
            <span>欢迎，<span id="username"></span></span>
            <a href="chat.html">💬 聊天</a>
            <a href="#" onclick="logout()">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <div class="search-card">
            <div class="search-input">
                <input type="text" id="keyword" placeholder="输入搜索关键词..." onkeypress="if(event.key==='Enter') search()">
                <button class="btn" onclick="search()">🔍 搜索</button>
            </div>
            <div class="search-filters">
                <select id="roomFilter">
                    <option value="">所有聊天室</option>
                </select>
                <select id="senderFilter">
                    <option value="">所有发送者</option>
                </select>
                <input type="date" id="startDate" placeholder="开始日期">
                <input type="date" id="endDate" placeholder="结束日期">
            </div>
        </div>

        <div id="results"></div>
        <div id="pagination" class="pagination"></div>
        <div id="statsInfo" class="stats-info"></div>
    </div>

    <script>
        let currentUser = null;
        let allRooms = [];
        let allMessages = [];
        let allSenders = new Set();
        
        // 分页变量
        let currentResults = [];
        let currentPage = 1;
        let itemsPerPage = 20;
        let totalPages = 1;

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function highlightKeyword(text, keyword) {
            if (!keyword) return escapeHtml(text);
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark>$1</mark>');
        }

        function checkAuth() {
            const userStr = sessionStorage.getItem('currentUser');
            if (!userStr) { window.location.href = 'index.html'; return null; }
            const user = JSON.parse(userStr);
            document.getElementById('username').textContent = user.username;
            return user;
        }

        async function loadAllMessages() {
            let allMsg = [];
            let page = 1;
            let hasMore = true;
            
            try {
                while (hasMore) {
                    const url = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues?labels=chatmessage&state=open&per_page=100&page=${page}`;
                    const res = await fetch(url, {
                        headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    
                    const linkHeader = res.headers.get('Link');
                    hasMore = linkHeader && linkHeader.includes('rel="next"');
                    
                    const issues = await res.json();
                    if (issues.length === 0) break;
                    
                    for (const issue of issues) {
                        const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                        if (match) {
                            const msgData = JSON.parse(match[1]);
                            if (!msgData.isRecalled) {
                                allMsg.push(msgData);
                            }
                        }
                    }
                    page++;
                    if (page > 20) break; // 最多加载20页（2000条）
                }
                return allMsg;
            } catch (error) {
                console.error('加载消息失败:', error);
                return [];
            }
        }

        async function loadData() {
            try {
                const baseUrl = `https://api.github.com/repos/${window.CONFIG.GITHUB_USERNAME}/${window.CONFIG.GITHUB_REPO}/issues`;
                
                // 加载聊天室
                const roomsRes = await fetch(`${baseUrl}?labels=chatroom&state=open`, {
                    headers: { 'Authorization': `token ${window.CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                const roomIssues = await roomsRes.json();
                allRooms = [];
                for (const issue of roomIssues) {
                    const match = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    if (match) {
                        const roomData = JSON.parse(match[1]);
                        if (roomData.members?.includes(currentUser.username) || roomData.creator === currentUser.username) {
                            allRooms.push(roomData);
                        }
                    }
                }
                
                // 加载所有消息
                allMessages = await loadAllMessages();
                
                // 收集所有发送者
                allSenders.clear();
                allMessages.forEach(msg => allSenders.add(msg.sender));
                
                // 更新筛选器选项
                const roomSelect = document.getElementById('roomFilter');
                roomSelect.innerHTML = '<option value="">所有聊天室</option>' + 
                    allRooms.map(r => `<option value="${r.id}">${escapeHtml(r.name)}</option>`).join('');
                
                const senderSelect = document.getElementById('senderFilter');
                senderSelect.innerHTML = '<option value="">所有发送者</option>' + 
                    [...allSenders].map(s => `<option value="${s}">${escapeHtml(s)}</option>`).join('');
                
                document.getElementById('results').innerHTML = '<div class="empty-state">🔍 输入关键词开始搜索</div>';
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('results').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        function getRoomName(roomId) {
            const room = allRooms.find(r => r.id === roomId);
            return room ? room.name : '未知聊天室';
        }

        function search() {
            const keyword = document.getElementById('keyword').value.trim();
            const roomId = document.getElementById('roomFilter').value;
            const sender = document.getElementById('senderFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            let results = [...allMessages];
            
            if (keyword) {
                results = results.filter(m => m.content.toLowerCase().includes(keyword.toLowerCase()));
            }
            if (roomId) {
                results = results.filter(m => m.roomId === roomId);
            }
            if (sender) {
                results = results.filter(m => m.sender === sender);
            }
            if (startDate) {
                const start = new Date(startDate);
                results = results.filter(m => new Date(m.timestamp) >= start);
            }
            if (endDate) {
                const end = new Date(endDate);
                end.setHours(23, 59, 59);
                results = results.filter(m => new Date(m.timestamp) <= end);
            }
            
            // 按时间倒序排列（最新的在前）
            results.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            currentResults = results;
            currentPage = 1;
            totalPages = Math.ceil(currentResults.length / itemsPerPage);
            
            renderResults();
            renderPagination();
            
            // 显示统计信息
            const statsDiv = document.getElementById('statsInfo');
            statsDiv.innerHTML = `找到 ${currentResults.length} 条相关消息`;
        }

        function renderResults() {
            const container = document.getElementById('results');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageResults = currentResults.slice(start, end);
            
            if (pageResults.length === 0) {
                container.innerHTML = '<div class="empty-state">🔍 没有找到相关消息</div>';
                return;
            }
            
            const keyword = document.getElementById('keyword').value.trim();
            
            container.innerHTML = pageResults.map(msg => `
                <div class="result-item">
                    <div class="result-room">📁 ${escapeHtml(getRoomName(msg.roomId))}</div>
                    <div class="result-sender">${escapeHtml(msg.sender)}</div>
                    <div class="result-content">${highlightKeyword(msg.content, keyword)}</div>
                    <div class="result-time">${new Date(msg.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一页
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← 上一页</button>`;
            
            // 页码
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<span style="padding: 0 5px;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span style="padding: 0 5px;">...</span>`;
                html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            // 下一页
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页 →</button>`;
            
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderResults();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        currentUser = checkAuth();
        if (currentUser) loadData();
    </script>
</body>
</html>
